name: CI

on:
  push:
  pull_request:

jobs:
  syntax:
    name: Python syntax check
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile Python files
        run: python -m compileall -q .
